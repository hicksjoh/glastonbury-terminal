<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Glastonbury Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      opacity: 0.5;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #8a5cf6;
    }
    p {
      font-size: 1rem;
      color: #888;
      max-width: 360px;
      line-height: 1.6;
    }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #8a5cf6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="96" fill="#08080d" stroke="#8a5cf6" stroke-width="8"/>
    <text x="256" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="320" font-weight="bold" fill="#8a5cf6">G</text>
  </svg>
  <h1>You're offline</h1>
  <p>Reconnect to the network to access the Glastonbury Terminal.</p>
  <button class="retry" onclick="window.location.reload()">Retry</button>
</body>
</html>
